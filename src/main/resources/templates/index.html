<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Strona główna</title>

    <style>
        :root {
            --bg: #efe2c3;
            --paper: #f7edd7;
            --paper-2: #f2e4c2;
            --ink: #3b2d1f;
            --ink-soft: #5a4630;
            --border: #8b6b3f;
            --accent: #6f4a21;
        }

        body {
            margin: 0;
            padding: 30px;
            background: var(--bg);
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
        }

        .page {
            max-width: 900px;
            margin: 40px auto;
            background: var(--paper);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-sizing: border-box;
        }

        .hero {
            background: var(--paper-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 2rem;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--ink-soft);
            line-height: 1.5;
            max-width: 700px;
        }

        .form-card {
            background: rgba(255, 248, 232, 0.75);
            border: 1px solid rgba(139, 107, 63, 0.45);
            border-radius: 12px;
            padding: 18px;
        }

        .form-card h2 {
            margin: 0 0 14px;
            color: var(--accent);
            border-bottom: 1px solid rgba(139, 107, 63, 0.4);
            padding-bottom: 6px;
            font-size: 1.2rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-weight: bold;
            color: var(--accent);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff8e8;
            color: var(--ink);
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(111, 74, 33, 0.15);
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn:hover {
            background: #573817;
        }

        .hint {
            font-size: 0.95rem;
            color: var(--ink-soft);
        }

        .example-box {
            margin-top: 20px;
            padding: 14px 16px;
            border: 1px dashed rgba(139, 107, 63, 0.7);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.35);
        }

        .example-title {
            margin: 0 0 8px;
            color: var(--accent);
            font-weight: bold;
        }

        .example-url {
            margin: 0;
            color: var(--ink);
            word-break: break-all;
        }

        .history-box {
            margin-top: 20px;
            padding: 16px;
            border: 1px solid rgba(139, 107, 63, 0.45);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.3);
        }

        .history-title {
            margin: 0 0 12px;
            color: var(--accent);
            font-weight: bold;
            font-size: 1rem;
        }

        .history-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .history-list li + li {
            margin-top: 8px;
        }

        .history-form {
            margin: 0;
        }

        .history-link-btn {
            display: block;
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 248, 232, 0.8);
            border: 1px solid rgba(139, 107, 63, 0.35);
            border-radius: 8px;
            color: var(--ink);
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            word-break: break-all;
            transition: background 0.2s ease;
        }

        .history-link-btn:hover {
            background: rgba(242, 228, 194, 0.95);
        }

        .empty-history {
            margin: 0;
            color: var(--ink-soft);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="page">
    <div class="hero">
        <h1>Championship Hub Scrapper</h1>
        <p class="subtitle">
            Wklej link do wydarzenia, aby pobrać dane graczy, armii i statystyk
            oraz przejść do widoku szczegółowego wydarzenia.
        </p>

        <div class="form-card">
            <h2>Import wydarzenia</h2>

            <form th:action="@{/result}" method="post">
                <div class="field-group">
                    <label for="eventUrl">Link do eventu</label>
                    <input type="text"
                           id="eventUrl"
                           name="eventUrl"
                           placeholder="Wklej pełny adres wydarzenia..."
                           required>
                </div>

                <div class="actions">
                    <button type="submit" class="btn">Pobierz dane</button>
                    <span class="hint">Obsługiwany jest pełny URL wydarzenia ChampionsHub.</span>
                </div>
            </form>

            <!-- 🔹 HISTORY -->
            <div class="history-box">
                <p class="history-title">Ostatnie wyszukiwania</p>

                <p class="empty-history"
                   th:if="${history == null or #lists.isEmpty(history)}">
                    Brak ostatnich wyszukiwań.
                </p>

                <ul class="history-list"
                    th:if="${history != null and !#lists.isEmpty(history)}">

                    <li th:each="h : ${history}">
                        <form th:action="@{/result}" method="post" class="history-form">
                            <input type="hidden" name="eventUrl" th:value="${h.key}">
                            <button type="submit" th:text="${h.value}"></button>
                        </form>
                    </li>

                </ul>
            </div>

        </div>
    </div>
</div>

</body>
</html>
